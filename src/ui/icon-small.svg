<?xml version="1.0" encoding="UTF-8"?>
<!-- Gotcha icon, small-size variant (16/32px): browser frame dropped and the
     scope + caterpillar zoomed to fill the canvas so it reads at toolbar size. -->
<svg width="128" height="128" viewBox="0 0 128 128" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="ring" x1="10" y1="10" x2="118" y2="118" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#d9604d"/>
      <stop offset="1" stop-color="#a2362a"/>
    </linearGradient>
    <radialGradient id="body" cx="0.35" cy="0.3" r="0.9">
      <stop offset="0" stop-color="#a7df80"/>
      <stop offset="0.6" stop-color="#6fbf4c"/>
      <stop offset="1" stop-color="#4a9b39"/>
    </radialGradient>
    <linearGradient id="arrow" x1="32" y1="100" x2="104" y2="28" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#3f8f30"/>
      <stop offset="1" stop-color="#5fb845"/>
    </linearGradient>
  </defs>

  <!-- Red sniper scope: ring + 4 outer ticks -->
  <g stroke="url(#ring)" stroke-width="9" stroke-linecap="round">
    <circle cx="64" cy="64" r="50" fill="none"/>
    <line x1="64" y1="2" x2="64" y2="16"/>
    <line x1="64" y1="112" x2="64" y2="126"/>
    <line x1="2" y1="64" x2="16" y2="64"/>
    <line x1="112" y1="64" x2="126" y2="64"/>
  </g>

  <!-- Green arrow (bottom-left → top-right) -->
  <g stroke="url(#arrow)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <line x1="34" y1="96" x2="96" y2="34"/>
    <polyline points="80,31 98,32 97,50"/>
  </g>

  <!-- Caterpillar: head (upper-left) → tail (lower-right) -->
  <g>
    <circle cx="90" cy="86" r="9" fill="url(#body)"/>
    <circle cx="80" cy="79" r="10.5" fill="url(#body)"/>
    <circle cx="69" cy="70" r="12" fill="url(#body)"/>
    <circle cx="57" cy="60" r="13.5" fill="url(#body)"/>
    <circle cx="44" cy="49" r="15.5" fill="url(#body)"/>
    <!-- antennae -->
    <g stroke="#4a9b39" stroke-width="3.6" stroke-linecap="round">
      <line x1="37" y1="38" x2="30" y2="26"/>
      <line x1="48" y1="35" x2="47" y2="22"/>
    </g>
    <circle cx="30" cy="25" r="3.2" fill="#4a9b39"/>
    <circle cx="47" cy="21" r="3.2" fill="#4a9b39"/>
    <!-- face -->
    <circle cx="39" cy="48" r="2.6" fill="#234a18"/>
    <circle cx="50" cy="48" r="2.6" fill="#234a18"/>
    <path d="M38 55 Q45 61 52 55" stroke="#234a18" stroke-width="3" fill="none" stroke-linecap="round"/>
  </g>
</svg>
